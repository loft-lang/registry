#
# PKG.REG R9 — `loft-lang/registry` PR validation workflow.
#
# Runs `validate.py` (in this repo at `tools/validate.py`) against
# every PR that touches `index.json`.  Gates: schema lint, tarball
# sha256 + size, reproducible-build re-check.
#
# Install step shipped 2026-05-24 (plan-12 Phase 6.5): builds loft
# from source on the runner.  Switches to a pinned binary release
# once one exists.

name: PR validate registry

on:
  pull_request:
    paths:
      - "index.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mold (loft's pinned linker)
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-loft-v1

      - name: Build loft from source
        run: |
          git clone --depth=1 https://github.com/jjstwerff/loft.git /tmp/loft
          (cd /tmp/loft && cargo build --release --bin loft)

      - name: Add loft to PATH
        run: echo "/tmp/loft/target/release" >> "$GITHUB_PATH"

      - name: Run validator
        run: python3 tools/validate.py
